      <text x="95" y="72" fill="#b9d7ff">CSV / TSV</text>
    </g>
    <g transform="translate(330 290)">
      <rect width="190" height="100" rx="18" fill="#ffffff" opacity="0.10" stroke="#70e1f5" stroke-width="2"/>
