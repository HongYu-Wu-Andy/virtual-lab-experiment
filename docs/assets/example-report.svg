<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Example Virtual Lab report</title>
  <desc id="desc">A snapshot of the synthetic offline example with selected features, target predictions, and provenance files.</desc>
  <rect width="1200" height="760" fill="#f5f7fb"/>
  <rect x="60" y="45" width="1080" height="670" rx="18" fill="#ffffff" stroke="#d9e1ef"/>
  <rect x="60" y="45" width="1080" height="105" rx="18" fill="#123b72"/>
  <rect x="60" y="125" width="1080" height="25" fill="#123b72"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="100" y="92" fill="#ffffff" font-size="30" font-weight="700">Virtual Lab Experiment</text>
    <text x="100" y="126" fill="#c9def8" font-size="18">synthetic_process_optimization · offline · deterministic example</text>
    <rect x="920" y="78" width="170" height="40" rx="20" fill="#d9f7e8"/>
    <text x="1005" y="104" text-anchor="middle" fill="#176b43" font-size="15" font-weight="700">POINT CHECKS MET</text>

    <text x="100" y="205" fill="#18324f" font-size="22" font-weight="700">Selected parameters</text>
    <g font-size="17">
      <rect x="100" y="230" width="290" height="95" rx="12" fill="#eef5ff"/>
      <text x="125" y="263" fill="#52677f">Temperature</text>
      <text x="125" y="301" fill="#123b72" font-size="28" font-weight="700">215.0 °C</text>
      <rect x="455" y="230" width="290" height="95" rx="12" fill="#eef5ff"/>
      <text x="480" y="263" fill="#52677f">Pressure</text>
      <text x="480" y="301" fill="#123b72" font-size="28" font-weight="700">1.50 MPa</text>
      <rect x="810" y="230" width="290" height="95" rx="12" fill="#eef5ff"/>
      <text x="835" y="263" fill="#52677f">Catalyst</text>
      <text x="835" y="301" fill="#123b72" font-size="28" font-weight="700">1.40%</text>
    </g>

    <text x="100" y="380" fill="#18324f" font-size="22" font-weight="700">Predicted targets</text>
    <rect x="100" y="405" width="465" height="105" rx="12" fill="#fff8e8" stroke="#efd08a"/>
    <text x="125" y="440" fill="#52677f" font-size="17">Yield · maximize · expected ≥ 80%</text>
    <text x="125" y="473" fill="#176b43" font-size="28" font-weight="700">84.00%  ✓</text>
    <text x="125" y="498" fill="#8a5a16" font-size="14">Interval 79.06–88.94% · conservative check fails</text>
    <rect x="635" y="405" width="465" height="105" rx="12" fill="#f1fbf6" stroke="#bce8cf"/>
    <text x="660" y="440" fill="#52677f" font-size="17">Energy · minimize · expected ≤ 36 kWh</text>
    <text x="660" y="473" fill="#176b43" font-size="28" font-weight="700">26.99 kWh  ✓</text>
    <text x="660" y="498" fill="#176b43" font-size="14">Interval 24.22–29.75 kWh · conservative check passes</text>

    <text x="100" y="570" fill="#18324f" font-size="22" font-weight="700">Saved provenance</text>
    <text x="100" y="607" fill="#52677f" font-size="17">✓ Agent roster, analysis plan, and every conversation</text>
    <text x="100" y="637" fill="#52677f" font-size="17">✓ Verified pipeline, uncertainty, support checks, metrics, and selected result</text>
    <text x="100" y="667" fill="#52677f" font-size="17">✓ Machine-readable JSON/CSV artifacts and complete Markdown handoff</text>
    <text x="1095" y="690" text-anchor="end" fill="#8a5a16" font-size="15">Synthetic demonstration — requires real experimental confirmation</text>
  </g>
</svg>
