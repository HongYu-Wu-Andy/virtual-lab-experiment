name: Bug report
description: Report a reproducible software problem without private data or credentials.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Never paste API keys, confidential datasets, or sensitive reports. Redact paths and values."
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.2.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options: [offline, live, auto]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Use synthetic or sanitized data only.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python version, provider name, and model identifier. Do not include a key.
